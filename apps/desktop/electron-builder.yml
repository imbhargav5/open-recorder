appId: dev.openrecorder.app
productName: Open Recorder
copyright: Copyright © 2024 Open Recorder

directories:
  output: release
  buildResources: icons

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"

mac:
  category: public.app-category.video
  icon: icons/mac/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Open Recorder uses the microphone for audio commentary during recordings.
    NSCameraUsageDescription: Open Recorder uses the camera for facecam recordings.
    NSAudioCaptureUsageDescription: Open Recorder captures system audio when you choose to record it.

publish:
  provider: github
  owner: imbhargav5
  repo: open-recorder
  releaseType: release
