name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - 'apps/macos/**'
              - 'apps/rust-service/**'
              - 'scripts/**'
              - 'Makefile'
              - 'package.json'

  test:
    name: Native macOS tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: make test-macos
