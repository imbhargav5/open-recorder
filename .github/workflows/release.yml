name: Release Tauri App

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    env:
      TAURI_TARGET_TRIPLE: aarch64-apple-darwin
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build sidecars
        run: npm run build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-14
    env:
      TAURI_TARGET_TRIPLE: x86_64-apple-darwin
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build sidecars
        run: npm run build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build sidecars
        run: npm run build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
      - build-linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | sort

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload

          copy_match() {
            local source_dir="$1"
            local pattern="$2"
            local dest_name="$3"
            local found=""

            if [ -d "$source_dir" ]; then
              found=$(find "$source_dir" -name "$pattern" -type f | head -1)
            fi

            if [ -n "$found" ]; then
              cp "$found" "release-upload/$dest_name"
            fi
          }

          copy_match "release-assets/macos-arm64" "*.dmg" "OpenRecorder-arm64.dmg"
          copy_match "release-assets/macos-arm64" "*.app.tar.gz" "OpenRecorder-arm64.app.tar.gz"
          copy_match "release-assets/macos-arm64" "*.app.tar.gz.sig" "OpenRecorder-arm64.app.tar.gz.sig"

          copy_match "release-assets/macos-x64" "*.dmg" "OpenRecorder-x64.dmg"
          copy_match "release-assets/macos-x64" "*.app.tar.gz" "OpenRecorder-x64.app.tar.gz"
          copy_match "release-assets/macos-x64" "*.app.tar.gz.sig" "OpenRecorder-x64.app.tar.gz.sig"

          copy_match "release-assets/windows-x64" "*setup.exe" "OpenRecorder-windows-x64.exe"
          copy_match "release-assets/windows-x64" "*.nsis.zip" "OpenRecorder-windows-x64.nsis.zip"
          copy_match "release-assets/windows-x64" "*.nsis.zip.sig" "OpenRecorder-windows-x64.nsis.zip.sig"

          copy_match "release-assets/linux-x64" "*.AppImage" "OpenRecorder-linux-x64.AppImage"
          copy_match "release-assets/linux-x64" "*.AppImage.tar.gz" "OpenRecorder-linux-x64.AppImage.tar.gz"
          copy_match "release-assets/linux-x64" "*.AppImage.tar.gz.sig" "OpenRecorder-linux-x64.AppImage.tar.gz.sig"
          copy_match "release-assets/linux-x64" "*.deb" "OpenRecorder-linux-x64.deb"

          find release-upload -type f | sort

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag_name }}"
          VERSION="${TAG#v}"
          REPO="imbhargav5/open-recorder"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(echo '${{ github.event.inputs.release_notes }}' | sed 's/"/\\"/g' || echo "")

          # Helper: find a file matching a glob and read its contents (first match)
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find release-upload -name "$pattern" -type f | head -1)
            if [ -n "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          get_filename() {
            local pattern="$1"
            local found
            found=$(find release-upload -name "$pattern" -type f | head -1)
            if [ -n "$found" ]; then
              basename "$found"
            else
              echo ""
            fi
          }

          # macOS arm64
          MAC_ARM64_SIG=$(read_sig "OpenRecorder-arm64.app.tar.gz.sig")
          MAC_ARM64_FILE=$(get_filename "OpenRecorder-arm64.app.tar.gz")
          MAC_X64_SIG=$(read_sig "OpenRecorder-x64.app.tar.gz.sig")
          MAC_X64_FILE=$(get_filename "OpenRecorder-x64.app.tar.gz")

          # Windows
          WIN_SIG=$(read_sig "OpenRecorder-windows-x64.nsis.zip.sig")
          WIN_FILE=$(get_filename "OpenRecorder-windows-x64.nsis.zip")
          if [ -z "$WIN_FILE" ]; then
            WIN_FILE=$(get_filename "OpenRecorder-windows-x64.exe")
          fi

          # Linux
          LINUX_SIG=$(read_sig "OpenRecorder-linux-x64.AppImage.tar.gz.sig")
          LINUX_FILE=$(get_filename "OpenRecorder-linux-x64.AppImage.tar.gz")
          if [ -z "$LINUX_FILE" ]; then
            LINUX_FILE=$(get_filename "OpenRecorder-linux-x64.AppImage")
          fi

          # Build the JSON manifest
          cat > release-upload/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM64_SIG}",
                "url": "${BASE_URL}/${MAC_ARM64_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${BASE_URL}/${MAC_X64_FILE}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/${WIN_FILE}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILE}"
              }
            }
          }
          MANIFEST

          echo "Generated latest.json:"
          cat release-upload/latest.json

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.release_notes }}
          makeLatest: ${{ github.event.inputs.make_latest }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-upload/*
