name: Release macOS App

on:
  push:
    branches:
      - main
    paths:
      - .github/release-plan.json
      - apps/rust-service/Cargo.toml
      - apps/rust-service/Cargo.lock
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      release_notes: ${{ steps.resolve.outputs.release_notes }}
      make_latest: ${{ steps.resolve.outputs.make_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve release context
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          TAG_NAME: ${{ github.event.inputs.tag_name }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          MAKE_LATEST: ${{ github.event.inputs.make_latest }}
        run: |
          node scripts/resolve-release-context.mjs \
            --event-name "$EVENT_NAME" \
            --before "$BEFORE_SHA" \
            --tag-name "$TAG_NAME" \
            --release-name "$RELEASE_NAME" \
            --release-notes "$RELEASE_NOTES" \
            --make-latest "$MAKE_LATEST" \
            --output "$GITHUB_OUTPUT"

  build-macos:
    name: Build native macOS app
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: make test-macos

      - name: Package app bundle
        run: make package-macos

      - name: Archive app bundle
        run: |
          mkdir -p release-upload
          ditto -c -k --sequesterRsrc --keepParent "release/Open Recorder.app" "release-upload/open-recorder-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: release-upload/open-recorder-macos.zip
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - resolve-release
      - build-macos
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p release-upload
          cp release-assets/macos-app/open-recorder-macos.zip release-upload/open-recorder-macos.zip

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-release.outputs.tag_name }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          body: ${{ needs.resolve-release.outputs.release_notes }}
          makeLatest: ${{ needs.resolve-release.outputs.make_latest }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-upload/*
