name: Release Electron App

on:
  push:
    branches:
      - main
    paths:
      - apps/desktop/package.json
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      release_notes: ${{ steps.resolve.outputs.release_notes }}
      make_latest: ${{ steps.resolve.outputs.make_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve release context
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          TAG_NAME: ${{ github.event.inputs.tag_name }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          MAKE_LATEST: ${{ github.event.inputs.make_latest }}
        run: |
          node scripts/resolve-release-context.mjs \
            --event-name "$EVENT_NAME" \
            --before "$BEFORE_SHA" \
            --tag-name "$TAG_NAME" \
            --release-name "$RELEASE_NAME" \
            --release-notes "$RELEASE_NOTES" \
            --make-latest "$MAKE_LATEST" \
            --output "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS (arm64 + x64)
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE || secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and Electron main process
        run: pnpm --filter @open-recorder/desktop build

      - name: Package with electron-builder (arm64 + x64)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --arm64 --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: apps/desktop/release/
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and Electron main process
        run: pnpm --filter @open-recorder/desktop build

      - name: Package with electron-builder (Windows x64)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: apps/desktop/release/
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and Electron main process
        run: pnpm --filter @open-recorder/desktop build

      - name: Package with electron-builder (Linux x64)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --linux --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: apps/desktop/release/
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - resolve-release
      - build-macos
      - build-windows-x64
      - build-linux-x64
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | sort

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload

          copy_match() {
            local source_dir="$1"
            local pattern="$2"
            local dest_name="$3"
            local found=""

            if [ -d "$source_dir" ]; then
              found=$(find "$source_dir" -name "$pattern" -not -name "*.blockmap" -type f | head -1)
            fi

            if [ -n "$found" ]; then
              cp "$found" "release-upload/$dest_name"
            fi
          }

          # macOS arm64
          copy_match "release-assets/macos" "*arm64*.dmg" "open-recorder-macos-arm64.dmg"
          copy_match "release-assets/macos" "*arm64*mac.zip" "open-recorder-macos-arm64-mac.zip"

          # macOS x64 (exclude arm64 files)
          x64_dmg=$(find release-assets/macos -name "*.dmg" -not -name "*arm64*" -not -name "*.blockmap" -type f | head -1)
          x64_zip=$(find release-assets/macos -name "*mac.zip" -not -name "*arm64*" -type f | head -1)
          [ -n "$x64_dmg" ] && cp "$x64_dmg" release-upload/open-recorder-macos-x64.dmg
          [ -n "$x64_zip" ] && cp "$x64_zip" release-upload/open-recorder-macos-x64-mac.zip

          # macOS updater manifest
          copy_match "release-assets/macos" "latest-mac.yml" "latest-mac.yml"

          # Windows x64
          copy_match "release-assets/windows-x64" "*Setup*.exe" "open-recorder-windows-x64-setup.exe"
          copy_match "release-assets/windows-x64" "latest.yml" "latest.yml"

          # Linux x64
          copy_match "release-assets/linux-x64" "*.AppImage" "open-recorder-linux-x64.AppImage"
          copy_match "release-assets/linux-x64" "latest-linux.yml" "latest-linux.yml"

          require_file() {
            local file_path="$1"
            if [ ! -f "$file_path" ]; then
              echo "Missing required artifact: $file_path" >&2
              exit 1
            fi
          }

          require_file "release-upload/open-recorder-macos-arm64.dmg"
          require_file "release-upload/open-recorder-macos-x64.dmg"
          require_file "release-upload/open-recorder-windows-x64-setup.exe"
          require_file "release-upload/open-recorder-linux-x64.AppImage"

          find release-upload -type f | sort

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-release.outputs.tag_name }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          body: ${{ needs.resolve-release.outputs.release_notes }}
          makeLatest: ${{ needs.resolve-release.outputs.make_latest }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-upload/*
