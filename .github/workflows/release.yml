name: Release Tauri App

on:
  push:
    branches:
      - main
    paths:
      - apps/desktop/package.json
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      release_notes: ${{ steps.resolve.outputs.release_notes }}
      make_latest: ${{ steps.resolve.outputs.make_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve release context
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          TAG_NAME: ${{ github.event.inputs.tag_name }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          MAKE_LATEST: ${{ github.event.inputs.make_latest }}
        run: |
          node scripts/resolve-release-context.mjs \
            --event-name "$EVENT_NAME" \
            --before "$BEFORE_SHA" \
            --tag-name "$TAG_NAME" \
            --release-name "$RELEASE_NAME" \
            --release-notes "$RELEASE_NOTES" \
            --make-latest "$MAKE_LATEST" \
            --output "$GITHUB_OUTPUT"

  build-macos-arm64:
    name: Build macOS arm64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: macos-14
    env:
      TAURI_TARGET_TRIPLE: aarch64-apple-darwin
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecars
        run: pnpm --filter @open-recorder/desktop build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: macos-14
    env:
      TAURI_TARGET_TRIPLE: x86_64-apple-darwin
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecars
        run: pnpm --filter @open-recorder/desktop build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target x86_64-apple-darwin

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecars
        run: pnpm --filter @open-recorder/desktop build:sidecars

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - resolve-release
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
      - build-linux-x64
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | sort

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload

          copy_match() {
            local source_dir="$1"
            local pattern="$2"
            local dest_name="$3"
            local found=""

            if [ -d "$source_dir" ]; then
              found=$(find "$source_dir" -name "$pattern" -type f | head -1)
            fi

            if [ -n "$found" ]; then
              cp "$found" "release-upload/$dest_name"
            fi
          }

          copy_match "release-assets/macos-arm64" "*.dmg" "OpenRecorder-arm64.dmg"
          copy_match "release-assets/macos-arm64" "*.app.tar.gz" "OpenRecorder-arm64.app.tar.gz"
          copy_match "release-assets/macos-arm64" "*.app.tar.gz.sig" "OpenRecorder-arm64.app.tar.gz.sig"

          copy_match "release-assets/macos-x64" "*.dmg" "OpenRecorder-x64.dmg"
          copy_match "release-assets/macos-x64" "*.app.tar.gz" "OpenRecorder-x64.app.tar.gz"
          copy_match "release-assets/macos-x64" "*.app.tar.gz.sig" "OpenRecorder-x64.app.tar.gz.sig"

          copy_match "release-assets/windows-x64" "*setup.exe" "OpenRecorder-windows-x64.exe"
          copy_match "release-assets/windows-x64" "*.nsis.zip" "OpenRecorder-windows-x64.nsis.zip"
          copy_match "release-assets/windows-x64" "*.nsis.zip.sig" "OpenRecorder-windows-x64.nsis.zip.sig"

          copy_match "release-assets/linux-x64" "*.AppImage" "OpenRecorder-linux-x64.AppImage"
          copy_match "release-assets/linux-x64" "*.AppImage.tar.gz" "OpenRecorder-linux-x64.AppImage.tar.gz"
          copy_match "release-assets/linux-x64" "*.AppImage.tar.gz.sig" "OpenRecorder-linux-x64.AppImage.tar.gz.sig"
          copy_match "release-assets/linux-x64" "*.deb" "OpenRecorder-linux-x64.deb"

          require_file() {
            local file_path="$1"
            if [ ! -f "$file_path" ]; then
              echo "Missing required updater artifact: $file_path" >&2
              exit 1
            fi
          }

          require_file "release-upload/OpenRecorder-arm64.app.tar.gz"
          require_file "release-upload/OpenRecorder-arm64.app.tar.gz.sig"
          require_file "release-upload/OpenRecorder-x64.app.tar.gz"
          require_file "release-upload/OpenRecorder-x64.app.tar.gz.sig"
          require_file "release-upload/OpenRecorder-windows-x64.nsis.zip"
          require_file "release-upload/OpenRecorder-windows-x64.nsis.zip.sig"
          require_file "release-upload/OpenRecorder-linux-x64.AppImage.tar.gz"
          require_file "release-upload/OpenRecorder-linux-x64.AppImage.tar.gz.sig"

          find release-upload -type f | sort

      - name: Generate updater manifest (latest.json)
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag_name }}
          RELEASE_NOTES: ${{ needs.resolve-release.outputs.release_notes }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          VERSION="${TAG#v}"
          REPO="imbhargav5/open-recorder"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(node -p 'JSON.stringify(process.env.RELEASE_NOTES ?? "").slice(1, -1)')

          read_required_file() {
            local file_path="$1"
            if [ ! -s "$file_path" ]; then
              echo "Required file is missing or empty: $file_path" >&2
              exit 1
            fi
            cat "$file_path"
          }

          MAC_ARM64_SIG=$(read_required_file "release-upload/OpenRecorder-arm64.app.tar.gz.sig")
          MAC_ARM64_FILE="OpenRecorder-arm64.app.tar.gz"
          MAC_X64_SIG=$(read_required_file "release-upload/OpenRecorder-x64.app.tar.gz.sig")
          MAC_X64_FILE="OpenRecorder-x64.app.tar.gz"
          WIN_SIG=$(read_required_file "release-upload/OpenRecorder-windows-x64.nsis.zip.sig")
          WIN_FILE="OpenRecorder-windows-x64.nsis.zip"
          LINUX_SIG=$(read_required_file "release-upload/OpenRecorder-linux-x64.AppImage.tar.gz.sig")
          LINUX_FILE="OpenRecorder-linux-x64.AppImage.tar.gz"

          cat > release-upload/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM64_SIG}",
                "url": "${BASE_URL}/${MAC_ARM64_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${BASE_URL}/${MAC_X64_FILE}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/${WIN_FILE}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILE}"
              }
            }
          }
          MANIFEST

          echo "Generated latest.json:"
          cat release-upload/latest.json

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-release.outputs.tag_name }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          body: ${{ needs.resolve-release.outputs.release_notes }}
          makeLatest: ${{ needs.resolve-release.outputs.make_latest }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-upload/*
